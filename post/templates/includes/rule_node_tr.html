<div id="rule-{{ node.section }}" class="tr-rule tr-node ps-3 py-1">
    <div class="d-flex align-items-start">
        <a href="#rule-{{ node.section }}" class="tr-permalink me-2" title="Link to this rule">#</a>
        <div class="flex-grow-1">
            <strong class="tr-rule-number">{{ node.section }}.</strong> {{ node.text|safe }}
            {% if node.annotations %}
            <div class="annotation-display">{{ node.annotations|safe }}</div>
            {% endif %}
            {% if user.is_authenticated %}
            <button class="btn btn-sm btn-outline-primary ms-2 edit-annotation-btn" data-section="{{ node.section }}" data-rule-type="TR">Edit</button>
            <div id="editor-container-{{ node.section }}" class="editor-container" data-annotation="{{ node.annotations }}">
                <div id="editor-{{ node.section }}" class="mb-2"></div>
                <button class="btn btn-sm btn-success save-annotation-btn" data-section="{{ node.section }}" data-rule-type="TR">Save</button>
                <button class="btn btn-sm btn-secondary cancel-annotation-btn" data-section="{{ node.section }}">Cancel</button>
            </div>
            {% endif %}
            {% for child in node.children %}
                {% include "includes/rule_node_tr.html" with node=child %}
            {% endfor %}
        </div>
    </div>
</div>
